name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # ── Backend: Unit tests ────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "true"
        run: pytest tests/ -v --tb=short

  # ── Backend: Linting ───────────────────────────────────────────────────────
  lint-backend:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check app/

  # ── Frontend: Build / type check ──────────────────────────────────────────
  test-frontend:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type check included)
        run: npm run build
        env:
          # Prevent Next.js from failing on missing env vars during CI build
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NODE_ENV: production

  # ── Docker: Verify images build ───────────────────────────────────────────
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify docker-compose config is valid
        run: docker compose config --quiet

      - name: Build all services
        run: docker compose build --parallel
        env:
          # Dummy values so build-time ARGs don't fail
          DATABASE_URL: "postgresql+asyncpg://regent:regent@db:5432/regentclaw"
          SECRET_KEY: "ci-docker-build-key"
