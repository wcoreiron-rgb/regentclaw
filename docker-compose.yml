version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: regentclaw
      POSTGRES_PASSWORD: regentclaw
      POSTGRES_DB: regentclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regentclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://regentclaw:regentclaw@db:5432/regentclaw
      DATABASE_URL_SYNC: postgresql://regentclaw:regentclaw@db:5432/regentclaw
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      ALLOWED_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # No NEXT_PUBLIC_API_URL — client uses relative /api/v1 paths,
      # which Next.js proxies to http://backend:8000 via next.config.js rewrites.
      # Setting it to http://localhost:8000 would make the browser try to reach
      # the backend directly, which fails from inside Docker.
      INTERNAL_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
