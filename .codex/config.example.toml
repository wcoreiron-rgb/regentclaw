sandbox_mode = "workspace-write"
approval_policy = "on-request"
model = "gpt-5.5"
reasoning_effort = "medium"

[approvals]
trusted_commands = [
  "git status",
  "git diff",
  "git log",
  "cd frontend && npm run lint",
  "cd frontend && npm run build",
  "cd backend && pytest"
]

# Keep approvals strict for destructive commands.
# Do not auto-trust commands that delete/reset/rewrite history.

