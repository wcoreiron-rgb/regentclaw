# RegentClaw — Alembic Configuration
# Usage:
#   alembic upgrade head          # apply all migrations
#   alembic downgrade -1          # roll back one migration
#   alembic revision --autogenerate -m "add_column_x"  # generate a new migration
#   alembic history               # show migration history
#   alembic stamp head            # mark existing DB as up-to-date (first-time only)

[alembic]
# Path to migration scripts
script_location = alembic

# Template used for generating new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# sys.path is prepended with this path
prepend_sys_path = .

# Timezone for migration timestamps
timezone = UTC

# Max length of migration description in file names
truncate_slug_length = 40

# Database URL — overridden by env var DATABASE_URL_SYNC if set
sqlalchemy.url = postgresql://regentclaw:regentclaw@localhost:5432/regentclaw

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
